name: Build 3DS App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show example structure
        shell: bash
        run: |
          echo "=== example 3ds folder ==="
          ls /opt/devkitpro/examples/3ds/ 2>/dev/null | head -20
          echo "=== graphics examples ==="
          ls /opt/devkitpro/examples/3ds/graphics/ 2>/dev/null
          echo "=== 2d example ==="
          ls /opt/devkitpro/examples/3ds/graphics/gpu/ 2>/dev/null
          echo "=== first example Makefile ==="
          find /opt/devkitpro/examples/3ds -name "Makefile" | head -1 | xargs cat
          echo "=== 3dsvars.sh content ==="
          cat /opt/devkitpro/3dsvars.sh
