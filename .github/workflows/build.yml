name: Build 3DS App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        shell: bash
        run: |
          cp $DEVKITPRO/libctru/default_icon.png app.png
          make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixelforge
          path: |
            pixelforge.3dsx
            pixelforge.smdh
