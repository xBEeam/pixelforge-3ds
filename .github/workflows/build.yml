name: Build 3DS App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Investigate
        shell: bash
        run: |
          echo "=== DEVKITPRO env ==="
          echo "DEVKITPRO=$DEVKITPRO"
          echo "DEVKITARM=$DEVKITARM"
          echo "=== /opt/devkitpro top level ==="
          ls /opt/devkitpro/ 2>/dev/null || echo "missing"
          echo "=== libctru ==="
          ls /opt/devkitpro/libctru/ 2>/dev/null || echo "missing"
          echo "=== search for 3ds_rules ==="
          fin
