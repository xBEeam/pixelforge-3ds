name: Build 3DS App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install 3DS libraries
        run: |
          dkp-pacman -S --noconfirm 3ds-dev libctru citro2d citro3d

      - name: Build
        run: |
          source /etc/profile.d/devkit-env.sh
          cp $DEVKITPRO/libctru/default_icon.png app.png
          make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixelforge
          path: |
            pixelforge.3dsx
            pixelforge.smdh
